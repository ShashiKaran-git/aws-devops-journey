apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-webapp
  namespace: flask-app
  labels:
    project: flask-webapp
spec:
  replicas: 3
  selector:
    matchLabels:
      app: flask-webapp
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: flask-webapp
    spec:
      containers:
      - name: flask-webapp
        image: shashikarandev/flask-webapp:v1
        ports:
        - containerPort: 5000
        env:
        - name: APP_MESSAGE
          valueFrom:
            configMapKeyRef:
              name: flask-config
              key: APP_MESSAGE
        - name: ENVIRONMENT
          valueFrom:
            configMapKeyRef:
              name: flask-config
              key: ENVIRONMENT
        - name: APP_VERSION
          valueFrom:
            configMapKeyRef:
              name: flask-config
              key: APP_VERSION
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: flask-secret
              key: DB_PASSWORD
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: flask-secret
              key: SECRET_KEY
        resources:
          requests:
            memory: "64Mi"
            cpu: "250m"
          limits:
            memory: "128Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 5
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 3
